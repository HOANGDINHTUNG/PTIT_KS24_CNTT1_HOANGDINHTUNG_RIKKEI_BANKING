spring.config.import=optional:file:.env[.properties]

spring.application.name=rikkei-bank


# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=${SERVER_PORT}

# Tối ưu hóa Tomcat Server cho High-Concurrency
server.tomcat.max-connections=8192
server.tomcat.accept-count=1000

# Bật luồng ảo (Virtual Threads - Siêu nhẹ, chống nghẽn RAM)
spring.threads.virtual.enabled=true

# HikariCP Connection Pool (Tối ưu tải CSDL)
spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}

# Upload file eKYC
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

# Storage: local hoặc cloudinary
app.storage.type=${STORAGE_TYPE}
app.storage.local-upload-dir=${LOCAL_UPLOAD_DIR}

# Cloudinary chỉ dùng khi app.storage.type=cloudinary
app.storage.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.storage.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.storage.cloudinary.api-secret=${CLOUDINARY_API_SECRET}